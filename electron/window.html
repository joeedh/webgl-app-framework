<!doctype html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <style>
      body {
          overflow : hidden;
      }
  </style>
  <script type="module">
    window.haveElectron = true;
    window.__baseModulePath = "../scripts";

    let start;

    import('../build/entry_point.js').then((app) => {
      start = () => {
        console.log("init!", app);
        app.init();
      }
    });

    window.oninit = function() {
      let timer = window.setInterval(() => {
        if (start) {
          window.clearInterval(timer);

          start();
        }
      }, 25)
    }
  </script>
</head>
<body onload='oninit()'>
<img id="iconsheet" style="display:none" src="../assets/iconsheet.svg"></img>
</body>
</html>
